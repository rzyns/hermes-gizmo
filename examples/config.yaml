plugins:
  enabled:
    - tool-slimmer

tool_slimmer:
  enabled: true
  mode: keyword
  top_k: 8
  always_include:
    - terminal
    - read_file
    - write_file
    - patch
    - search_files
  never_defer:
    - terminal
    - read_file
  include_mcp_tools: true
  include_native_tools: true
  log_decisions: true
  min_total_tools: 20
  min_estimated_reduction_percent: 5.0
  two_pass:
    hydrate_limit: 8
    max_catalog_tools: 120
    cache_hydrated_tools: true
    fallback_to_keyword: true
  fail_open: true
  dry_run: false
