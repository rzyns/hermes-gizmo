name: tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src tests

      - name: Compile
        run: uv run python -m compileall -q src tests dashboard-plugin/tool-slimmer dashboard-plugin/gizmo

      - name: Test
        run: uv run pytest -q

      - name: Build package
        run: uv run python -m build

      - name: Check package assets
        run: bash scripts/check-wheel-assets.sh

      - name: Temp install smoke
        run: |
          python -m venv /tmp/hermes-gizmo-smoke
          /tmp/hermes-gizmo-smoke/bin/python -m pip install -U pip
          /tmp/hermes-gizmo-smoke/bin/python -m pip install dist/*.whl
          /tmp/hermes-gizmo-smoke/bin/python - <<'PY'
          import importlib.metadata as md
          import hermes_gizmo, hermes_tool_slimmer
          print(md.version("hermes-tool-slimmer"))
          print(hermes_gizmo.register is hermes_tool_slimmer.register)
          PY
          /tmp/hermes-gizmo-smoke/bin/hermes-gizmo --help
